<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan Radiologi - Rumkit Palangkaraya</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-from: #2B32B2;
            --bg-to: #1488CC;
            --glass-bg: rgba(255,255,255,0.06);
            --glass-card: rgba(255,255,255,0.09);
            --glass-input: rgba(255,255,255,0.11);
            --glass-border: rgba(255,255,255,0.16);
            --text-main: #ffffff;
            --text-muted: rgba(255,255,255,0.52);
            --primary: #38bdf8;
            --primary-dark: #0ea5e9;
            --danger: #f87171;
            --success: #34d399;
            --accent: #818cf8;
            --radius-main: 24px;
            --radius-card: 18px;
            --radius-input: 12px;
            --fab-bottom: 35px;
            --fab-right: 35px;
            --fab-height: 54px;
        }

        html { height: 100%; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 18px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: calc(18px + 80px);
            position: relative;
        }

        /* ===== PARALLAX STAR BACKGROUND ===== */
        .star-bg {
            position: fixed;
            inset: 0;
            background: #1488CC;
            background: -webkit-linear-gradient(to right, #2B32B2, #1488CC);
            background: linear-gradient(to right, #2B32B2, #1488CC);
            z-index: -3;
        }

        .stars-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
        }

        /* Three layers of stars for depth parallax */
        .stars-layer canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* Nebula glow overlay */
        .nebula {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                radial-gradient(ellipse 70% 50% at 20% 30%, rgba(56,189,248,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 80% 70%, rgba(129,140,248,0.10) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 50% 10%, rgba(43,50,178,0.15) 0%, transparent 60%);
        }

        /* ===== APP WRAP ===== */
        .app-wrap {
            width: 100%;
            max-width: 540px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-main);
            padding: 22px;
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            box-shadow:
                0 8px 40px rgba(20,136,204,0.15),
                0 2px 80px rgba(43,50,178,0.1),
                inset 0 1px 0 rgba(255,255,255,0.18);
            transform: translateZ(0);
            will-change: transform;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle inner shimmer line on top */
        .app-wrap::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(56,189,248,0.6), rgba(129,140,248,0.6), transparent);
            border-radius: 100%;
        }

        @media (min-width: 992px) {
            body { padding: 28px; align-items: stretch; padding-bottom: 28px; }
            .app-wrap { max-width: 100%; width: 100%; padding: 32px; margin: 0 auto; margin-bottom: 0; }
            .main-grid { display: grid; grid-template-columns: 1.35fr 1fr; gap: 32px; align-items: start; }
            .panel-right { position: sticky; top: 28px; }
            #hasil-laporan { min-height: 580px; }
        }

        @media (max-width: 991px) {
            body { padding-bottom: 130px; }
            .btn-row { flex-direction: column; gap: 8px; }
            .action-btn { padding: 16px 10px; font-size: 0.9rem; }
        }

        @media (max-width: 400px) {
            body { padding-bottom: 145px; }
            .fab-speed-dial { bottom: 20px; right: 16px; }
        }

        /* ===== HEADER ===== */
        .header-logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 22px;
            gap: 10px;
        }

        .header-logo-wrap img {
            height: 70px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 2px 16px rgba(56,189,248,0.55));
        }

        .header-title {
            text-align: center;
            font-size: 1.05rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Divider */
        .header-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
            border-radius: 100%;
            margin: 6px auto 0;
        }

        /* ===== FORM SECTIONS ===== */
        .form-section, .kategori-card {
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-card);
            padding: 16px;
            margin-bottom: 12px;
            transform: translateZ(0);
            will-change: transform;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .form-section:hover, .kategori-card:hover {
            border-color: rgba(56,189,248,0.25);
            box-shadow: 0 4px 20px rgba(56,189,248,0.06);
        }

        .section-title {
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(56,189,248,0.18);
        }

        .kategori-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 2px 9px;
            border-radius: 12px;
            font-size: 0.68rem;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(56,189,248,0.3);
        }

        label {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        select, input[type="date"] {
            width: 100%;
            padding: 11px 13px;
            background: var(--glass-input);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-input);
            font-size: 0.85rem;
            color: #fff;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        select:focus, input[type="date"]:focus {
            border-color: rgba(56,189,248,0.45);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.08);
        }

        select option { background-color: #1e2d6e; color: #ffffff; }

        .input-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .petugas-row {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .counter-item { display: flex; flex-direction: column; gap: 5px; }

        .sub-label {
            font-size: 0.58rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .counter-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 11px;
            padding: 4px;
            transition: border-color 0.2s;
        }

        .counter-controls:hover { border-color: rgba(56,189,248,0.22); }

        .btn-step {
            width: 33px;
            height: 33px;
            border-radius: 9px;
            border: none;
            background: rgba(255,255,255,0.10);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-step:active { background: rgba(56,189,248,0.3); transform: scale(0.92); }

        .val-display {
            font-weight: 800;
            font-size: 1rem;
            color: #fff;
            min-width: 22px;
            text-align: center;
        }

        /* ===== HASIL LAPORAN ===== */
        #hasil-laporan {
            background: rgba(10,20,60,0.65);
            border: 1px solid rgba(56,189,248,0.15);
            border-radius: var(--radius-card);
            color: #bfdbfe;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.77rem;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-y: auto;
            max-height: 70vh;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            cursor: text;
            box-shadow: inset 0 2px 20px rgba(20,136,204,0.08);
        }

        /* ===== BUTTONS ===== */
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }

        .action-btn {
            flex: 1;
            padding: 15px 10px;
            border: none;
            border-radius: var(--radius-input);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            color: #fff;
            transition: transform 0.12s ease, filter 0.2s ease, box-shadow 0.2s ease;
            letter-spacing: 0.3px;
        }

        .action-btn:active { transform: scale(0.97); filter: brightness(0.9); }

        .btn-copy {
            background: linear-gradient(135deg, #2a7de1, #1a5fb4);
            box-shadow: 0 4px 16px rgba(42,125,225,0.3);
        }

        .btn-copy:hover { box-shadow: 0 6px 22px rgba(42,125,225,0.45); }

        .btn-wa {
            background: linear-gradient(135deg, #25d366, #1aaa52);
            box-shadow: 0 4px 16px rgba(37,211,102,0.28);
        }

        .btn-wa:hover { box-shadow: 0 6px 22px rgba(37,211,102,0.42); }

        .btn-clear {
            width: 100%;
            padding: 13px;
            margin-top: 10px;
            border: 1px solid rgba(248,113,113,0.25);
            border-radius: var(--radius-input);
            background: rgba(248,113,113,0.08);
            color: var(--danger);
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-clear:hover {
            background: rgba(248,113,113,0.16);
            box-shadow: 0 0 0 1px rgba(248,113,113,0.3);
        }

        /* ===== FAB SPEED DIAL ===== */
        .fab-speed-dial {
            position: fixed;
            bottom: var(--fab-bottom);
            right: var(--fab-right);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .fab-menu-items {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 9px;
            opacity: 0;
            transform: translateY(10px) scale(0.95);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .fab-speed-dial.open .fab-menu-items {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .fab-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            cursor: pointer;
        }

        .fab-menu-label {
            background: rgba(10,20,70,0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 7px 15px;
            border-radius: 20px;
            border: 1px solid rgba(56,189,248,0.2);
            white-space: nowrap;
            box-shadow: 0 4px 14px rgba(20,136,204,0.2);
        }

        .fab-menu-icon {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.22);
            flex-shrink: 0;
            transition: transform 0.15s ease;
        }

        .fab-menu-item:active .fab-menu-icon { transform: scale(0.92); }
        .fab-menu-icon.blue  { background: linear-gradient(135deg, #2a7de1, #1a5fb4); }
        .fab-menu-icon.green { background: linear-gradient(135deg, #25d366, #1aaa52); }

        @keyframes floating {
            0%   { transform: translateY(0px); }
            50%  { transform: translateY(-7px); }
            100% { transform: translateY(0px); }
        }

        .fab-main-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            height: var(--fab-height);
            width: auto;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 8px 28px rgba(56,189,248,0.35), 0 2px 8px rgba(43,50,178,0.2);
            padding: 0 22px;
            gap: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            animation: floating 3s ease-in-out infinite;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-radius 0.2s ease, width 0.2s ease, padding 0.2s ease;
            white-space: nowrap;
            user-select: none;
        }

        .fab-speed-dial.open .fab-main-btn {
            animation: none;
            border-radius: 50%;
            width: var(--fab-height);
            padding: 0;
            justify-content: center;
        }

        .fab-main-btn:active { transform: scale(0.95); }

        .fab-toggle-icon {
            font-size: 22px;
            transition: transform 0.3s ease;
        }

        .fab-speed-dial.open .fab-toggle-icon { transform: rotate(45deg); }

        .fab-speed-dial.open .fab-toggle-text { display: none; }

        /* ===== TOAST ===== */
        .toast-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,20,70,0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(56,189,248,0.25);
            padding: 13px 26px;
            border-radius: 30px;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            transition: top 0.5s cubic-bezier(0.68,-0.55,0.265,1.55);
            z-index: 99999;
            pointer-events: none;
            box-shadow: 0 8px 28px rgba(56,189,248,0.2);
        }

        .toast-notification.show { top: 32px; }

        /* ===== SCROLLBAR ===== */
        #hasil-laporan::-webkit-scrollbar { width: 4px; }
        #hasil-laporan::-webkit-scrollbar-track { background: transparent; }
        #hasil-laporan::-webkit-scrollbar-thumb { background: rgba(56,189,248,0.3); border-radius: 4px; }

        /* ===== PETUGAS LABEL GAP ===== */
        .petugas-group { margin-bottom: 10px; }
        .petugas-group:last-child { margin-bottom: 0; }
    </style>
</head>

<script>
// ===== PARALLAX STAR FIELD =====
(function() {
    var canvas = document.getElementById('starCanvas');
    var ctx = canvas.getContext('2d');
    var stars = [];
    var mouse = { x: 0, y: 0 };
    var W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function randomStar() {
        return {
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.4 + 0.3,
            alpha: Math.random() * 0.7 + 0.2,
            speed: Math.random() * 0.015 + 0.005,    // twinkle speed
            phase: Math.random() * Math.PI * 2,
            layer: Math.floor(Math.random() * 3),     // 0=far,1=mid,2=near
            px: 0, py: 0                              // parallax offset
        };
    }

    function initStars(count) {
        stars = [];
        for (var i = 0; i < count; i++) stars.push(randomStar());
    }

    resize();
    initStars(280);
    window.addEventListener('resize', function() { resize(); initStars(280); });

    // Mouse parallax
    window.addEventListener('mousemove', function(e) {
        mouse.x = (e.clientX / W - 0.5) * 2;
        mouse.y = (e.clientY / H - 0.5) * 2;
    });

    // Touch parallax
    window.addEventListener('touchmove', function(e) {
        if (e.touches.length) {
            mouse.x = (e.touches[0].clientX / W - 0.5) * 2;
            mouse.y = (e.touches[0].clientY / H - 0.5) * 2;
        }
    }, { passive: true });

    var depthFactor = [4, 9, 16]; // parallax multiplier per layer
    var t = 0;

    function draw() {
        ctx.clearRect(0, 0, W, H);
        t += 0.016;
        stars.forEach(function(s) {
            var twinkle = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 60 + s.phase));
            var df = depthFactor[s.layer];
            var ox = mouse.x * df;
            var oy = mouse.y * df;
            var sx = (s.x + ox + W * 2) % W;
            var sy = (s.y + oy + H * 2) % H;

            // Glow for near stars
            if (s.layer === 2) {
                ctx.beginPath();
                var grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, s.r * 3.5);
                grd.addColorStop(0, 'rgba(186,230,253,' + (twinkle * 0.55) + ')');
                grd.addColorStop(1, 'rgba(186,230,253,0)');
                ctx.arc(sx, sy, s.r * 3.5, 0, Math.PI * 2);
                ctx.fillStyle = grd;
                ctx.fill();
            }

            ctx.beginPath();
            ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
            // Color variation
            var colors = [
                'rgba(255,255,255,',
                'rgba(186,230,253,',
                'rgba(196,181,253,'
            ];
            ctx.fillStyle = colors[s.layer] + twinkle + ')';
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }

    draw();
})();

function toggleFab() {
    document.getElementById('fabDial').classList.toggle('open');
}

document.addEventListener('click', function(e) {
    var dial = document.getElementById('fabDial');
    if (!dial.contains(e.target)) dial.classList.remove('open');

// ===== APP LOGIC =====
var kat = ["Militer", "PNS", "KBT", "Masyarakat Umum", "RO Gigi"];
var sub = ["BPJS", "Umum", "MCU", "Jasa Raharja"];

function initDate() {
    var n = new Date();
    document.getElementById('tgl').value = n.toISOString().split('T')[0];
}

function fmtTgl(s) {
    if (!s) return '';
    var p = s.split('-');
    var hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
    var bln  = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    var dt = new Date(+p[0], +p[1]-1, +p[2]);
    return hari[dt.getDay()] + ', ' + parseInt(p[2]) + ' ' + bln[+p[1]-1] + ' ' + p[0];
}

function chg(id, d) {
    var el = document.getElementById(id);
    var v = (parseInt(el.value) || 0) + d;
    if (v < 0) v = 0;
    el.value = v;
    document.getElementById('dsp-' + id).innerText = v;
    gen();
}

function selAll() {
    var n = document.getElementById('hasil-laporan');
    var sel = window.getSelection();
    var r = document.createRange();
    r.selectNodeContents(n);
    sel.removeAllRanges();
    sel.addRange(r);
}

(function buildInputs() {
    var c = document.getElementById('pasien-inputs');
    kat.forEach(function(k, i) {
        var div = document.createElement('div');
        div.className = 'kategori-card';
        var grid = '';
        sub.forEach(function(s) {
            var id = s.replace(/\s+/g,'-') + '-' + i;
            grid += '<div class="counter-item">' +
                '<div class="sub-label">' + s + '</div>' +
                '<div class="counter-controls">' +
                '<button class="btn-step" onclick="chg(\'' + id + '\',-1)">−</button>' +
                '<span class="val-display" id="dsp-' + id + '">0</span>' +
                '<button class="btn-step" onclick="chg(\'' + id + '\',1)">+</button>' +
                '<input type="hidden" id="' + id + '" class="ip" value="0">' +
                '</div></div>';
        });
        div.innerHTML = '<div class="kategori-title"><span class="badge">' + (i+1) + '</span>' + k + '</div>' +
            '<div class="counter-grid">' + grid + '</div>';
        c.appendChild(div);
    });
})();

function getLaporan() {
    var sv  = document.getElementById('salam').value;
    var tgl = fmtTgl(document.getElementById('tgl').value);
    var p1  = document.getElementById('p1').value;
    var s1  = document.getElementById('s1').value;
    var p2  = document.getElementById('p2').value;
    var s2  = document.getElementById('s2').value;
    var sf  = sv;
    if (sv === 'otomatis') {
        var h = new Date().getHours();
        sf = h >= 6 && h < 12 ? 'Selamat pagi' : h >= 12 && h < 16 ? 'Selamat siang' : 'Selamat malam';
    }
    var total = 0, detail = '';
    kat.forEach(function(k, i) {
        var items = [], counts = 0;
        sub.forEach(function(s) {
            var v = parseInt(document.getElementById(s.replace(/\s+/g,'-') + '-' + i).value) || 0;
            if (v > 0) { items.push(v + ' orang (' + s + ')'); counts += v; }
        });
        total += counts;
        var ket = items.length > 0 ? items.join('\n                    ') : 'nihil';
        detail += (i+1) + '. ' + k.padEnd(14) + ': ' + ket + '\n';
    });
    return 'Kepada\nYth. Karumkit Tk. IV 12.07.03 Palangkaraya\n\n' + sf +
        '\nIjin melaporkan serah terima Dinas Radiologi Rumkit TNI AD\n*' + tgl + '*\n\nSebagai berikut :\n *Dinas ' +
        s1 + '*\n  ' + p1 + '\n\n *Dinas ' + s2 + '*\n  ' + p2 + '\n\nJumlah pasien : ' + total +
        ' orang\n\nKeterangan : \n' + detail +
        '\nRumkit TNI-AD dalam keadaan aman, sekian laporan selesai, Terimakasih.';
}

function gen() {
    document.getElementById('hasil-laporan').innerText = getLaporan();
}

function doReset() {
    if (confirm('Reset semua data pasien?')) {
        document.querySelectorAll('.ip').forEach(function(el) {
            el.value = 0;
            document.getElementById('dsp-' + el.id).innerText = 0;
        });
        gen();
    }
}

function doKopi() {
    var txt = getLaporan();
    navigator.clipboard.writeText(txt).then(function() {
        var toast = document.getElementById('toastNotif');
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 3000);
    });
}

function doWA() {
    var enc = encodeURIComponent(getLaporan());
    window.open('https://wa.me/?text=' + enc, '_blank');
}

initDate();
gen();
</script>
