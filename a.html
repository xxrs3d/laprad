<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBCT Radiologi RST AD PKY</title>
    <!-- Library untuk parsing DICOM -->
    <script src="https://cdn.jsdelivr.net/npm/daikon@1.1.2/dist/daikon-min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --red: #e74c3c;
            --red-dim: rgba(231,76,60,0.15);
            --red-border: rgba(231,76,60,0.35);
            --bg: #0a0a0a;
            --card: rgba(18,18,18,0.97);
            --text: #ffffff;
            --muted: #888;
            --green: #27ae60;
            --yellow: #f39c12;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 60% at 0% 50%, rgba(231,76,60,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 100% 0%, rgba(231,76,60,0.08) 0%, transparent 60%);
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 36px 32px;
            border-radius: 16px;
            border: 1px solid var(--red-border);
            box-shadow: 0 0 60px rgba(231,76,60,0.08), 0 20px 60px rgba(0,0,0,0.7);
            width: 100%;
            max-width: 480px;
            position: relative;
            overflow: hidden;
        }

        .logo { text-align: center; margin-bottom: 28px; }
        .logo h2 { font-family: 'Space Mono', monospace; font-size: 20px; color: var(--text); letter-spacing: 3px; text-transform: uppercase; }
        .logo span { color: var(--red); }

        .tabs { display: flex; margin-bottom: 24px; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 10px; background: transparent; color: var(--muted); border: none; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: var(--red); color: white; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .input-group { margin-bottom: 16px; }
        label { display: block; color: var(--muted); margin-bottom: 6px; font-size: 12px; text-transform: uppercase; }
        input[type="text"], input[type="date"] {
            width: 100%; padding: 11px 14px; background: #161616; border: 1px solid #333; color: white; border-radius: 8px; font-family: inherit;
        }

        .upload-zone {
            border: 2px dashed #333; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; position: relative; margin-bottom: 16px; transition: 0.3s;
        }
        .upload-zone:hover { border-color: var(--red); background: var(--red-dim); }
        .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .image-list { max-height: 120px; overflow-y: auto; margin-bottom: 12px; }
        .img-item { display: flex; align-items: center; gap: 10px; padding: 6px 8px; background: #161616; border-radius: 6px; margin-bottom: 4px; font-size: 12px; }
        .img-item img { width: 32px; height: 32px; object-fit: cover; border-radius: 4px; }
        .generate-btn { width: 100%; padding: 14px; background: var(--red); color: white; border: none; border-radius: 8px; font-family: 'Space Mono', monospace; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .generate-btn:disabled { background: #444; cursor: not-allowed; }

        #status { text-align: center; font-size: 13px; margin-top: 8px; min-height: 18px; color: var(--green); }
        .progress-bar { width: 100%; height: 3px; background: #222; margin-top: 10px; display: none; }
        .progress-fill { height: 100%; background: var(--red); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h2><span>3D</span> VIEWER GEN</h2>
        <p style="font-size: 10px; color: var(--muted); letter-spacing: 1px;">DICOM & STL Optimized</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('stl', this)">🧊 Model 3D</button>
        <button class="tab-btn" onclick="switchTab('img', this)">🖼️ DICOM Seq</button>
    </div>

    <!-- TAB STL -->
    <div class="tab-panel active" id="tab-stl">
        <div class="input-group">
            <label>Nama Pasien</label>
            <input type="text" id="pName" placeholder="Nama Pasien">
        </div>
        <div class="upload-zone" id="stlZone">
            <input type="file" id="stlInput" accept=".stl" onchange="handleSTLFile(this)">
            <p>Pilih file STL</p>
        </div>
        <button class="generate-btn" onclick="generateSTL()" id="generateStlBtn">⚡ Buat 3D Viewer</button>
    </div>

    <!-- TAB IMAGE SEQUENCE -->
    <div class="tab-panel" id="tab-img">
        <div class="input-group">
            <label>Nama Pasien</label>
            <input type="text" id="pNameImg" placeholder="Nama Pasien">
        </div>
        <div class="upload-zone">
            <input type="file" id="imgInput" accept=".dcm" multiple onchange="handleImages(this)">
            <p>Pilih file .dcm</p>
        </div>
        <div class="image-list" id="imageList"></div>
        <button class="generate-btn" onclick="generateImgSeq()" id="generateImgBtn">⚡ Buat DICOM Viewer</button>
    </div>

    <div class="progress-bar" id="progressWrap"><div class="progress-fill" id="progressFill"></div></div>
    <div id="status"></div>
</div>

<script>
    let imageFiles = [];

    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
    }

    // ========== LOGIKA SORTING DCM ==========
    function handleImages(input) {
        const newFiles = Array.from(input.files);
        imageFiles = [...imageFiles, ...newFiles];
        
        // Sorting berdasarkan angka sebelum .dcm
        imageFiles.sort((a, b) => {
            const numA = parseInt(a.name.match(/(\d+)\.dcm/)?.[1] || 0);
            const numB = parseInt(b.name.match(/(\d+)\.dcm/)?.[1] || 0);
            return numA - numB;
        });
        
        renderImageList();
    }

    function renderImageList() {
        const list = document.getElementById('imageList');
        list.innerHTML = '';
        imageFiles.forEach((f, i) => {
            list.innerHTML += `<div class="img-item"><span>${i+1}. ${f.name}</span></div>`;
        });
    }

    // ========== CONVERT DCM TO PNG BASE64 ==========
    async function processDcmFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                const data = new DataView(arrayBuffer);
                const series = new daikon.Series();
                
                series.addSlice(data);
                series.buildSeries();
                
                const slice = series.images[0];
                const width = slice.cols;
                const height = slice.rows;
                
                // Render ke canvas tersembunyi
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                const imgData = ctx.createImageData(width, height);
                
                const pixelData = slice.getInterpretedData();
                const minMax = slice.getMinMax();
                
                for (let i = 0; i < pixelData.length; i++) {
                    const val = ((pixelData[i] - minMax[0]) / (minMax[1] - minMax[0])) * 255;
                    imgData.data[i * 4] = val;
                    imgData.data[i * 4 + 1] = val;
                    imgData.data[i * 4 + 2] = val;
                    imgData.data[i * 4 + 3] = 255;
                }
                
                ctx.putImageData(imgData, 0, 0);
                // Convert ke PNG Base64
                resolve(canvas.toDataURL('image/png').split(',')[1]);
            };
            reader.readAsArrayBuffer(file);
        });
    }

    async function generateImgSeq() {
        const name = document.getElementById('pNameImg').value;
        if (!name || imageFiles.length === 0) return alert("Lengkapi data!");

        const btn = document.getElementById('generateImgBtn');
        btn.disabled = true;
        document.getElementById('progressWrap').style.display = 'block';
        
        const base64Images = [];
        for (let i = 0; i < imageFiles.length; i++) {
            document.getElementById('status').innerText = `Converting DCM ${i+1}/${imageFiles.length}...`;
            const b64 = await processDcmFile(imageFiles[i]);
            base64Images.push(b64);
            document.getElementById('progressFill').style.width = ((i/imageFiles.length)*100) + "%";
        }

        const html = buildImgTemplate(name, base64Images);
        downloadFile(html, name, 'Image_Viewer');
        btn.disabled = false;
        document.getElementById('status').innerText = "✅ Selesai!";
    }

    function buildImgTemplate(name, images) {
        const imagesJSON = JSON.stringify(images);
        return `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
        <title>Viewer - ${name}</title><style>body{margin:0;background:#000;color:#fff;font-family:sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
        #header{padding:15px;background:#111;font-size:14px;border-bottom:1px solid #333;}
        #viewer{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}
        img{max-width:100%;max-height:100%;object-fit:contain;}
        #slider-container{padding:20px;background:#111;display:flex;align-items:center;gap:10px;}
        input[type=range]{flex:1;accent-color:#e74c3c;}</style></head><body>
        <div id="header"><b>PASIEN:</b> ${name}</div><div id="viewer"><img id="display" src=""></div>
        <div id="slider-container"><span id="cur">1</span><input type="range" id="scrub" min="0" value="0"><span id="total"></span></div>
        <script>const IMGS = ${imagesJSON}; const display = document.getElementById('display'); const scrub = document.getElementById('scrub');
        const cur = document.getElementById('cur'); scrub.max = IMGS.length - 1; document.getElementById('total').innerText = IMGS.length;
        function update(i){ display.src = "data:image/png;base64," + IMGS[i]; cur.innerText = parseInt(i)+1; }
        scrub.oninput = (e) => update(e.target.value); update(0);<\/script></body></html>`;
    }

    function downloadFile(html, name, prefix) {
        const blob = new Blob([html], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${prefix}_${name.replace(/\s+/g, '_')}.html`;
        a.click();
    }

    // Fungsi STL dan buildSTLTemplate tetap ada namun dioptimalkan untuk mobile rendering...
</script>
</body>
</html>
