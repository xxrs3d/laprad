<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D viewer CBCT</title>
    <script src="https://accounts.google.com/gsi/client" onload="initClient()"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        #adminTools { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .upload-area { border: 2px dashed #007bff; padding: 30px; text-align: center; color: #007bff; border-radius: 10px; cursor: pointer; background: #f0f7ff; }
        .result-box { display: none; background: #e9ecef; padding: 15px; border-radius: 8px; margin-top: 15px; word-break: break-all; border-left: 5px solid #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginSection">
            <h2 style="text-align: center;">3D Viewer CBCT</h2>
            <input type="password" id="passInput" placeholder="Enter Operator Password">
            <button onclick="checkPass()">Masuk</button>
        </div>

        <div id="adminTools">
            <h3>Data Pasien CBCT</h3>
            <input type="text" id="clientName" placeholder="Full Name">
            <input type="date" id="clientDOB">
            <input type="text" id="clientContact" placeholder="Contact Number/Email">
            
            <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <strong>Drag & Drop STL File</strong><br>or click to browse
            </div>
            <input type="file" id="fileInput" style="display:none" accept=".stl" onchange="handleFile(this.files[0])">
            
            <div id="status" style="margin-top:10px; font-size: 14px; text-align: center;"></div>
            <div id="resultBox" class="result-box">
                <strong>Public Viewer Link:</strong><br>
                <a id="shareLink" href="#" target="_blank" style="color: #007bff; font-size: 13px;"></a>
                <button onclick="copyLink()" style="margin-top: 10px; background: #6c757d;">Copy Link</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const ACCESS_PASS = "RAD001"; // Change your password here
        const CLIENT_ID = "YOUR_CLIENT_ID_HERE"; 
        const API_KEY = "YOUR_API_KEY_HERE";
        // ---------------------

        let tokenResponse = null;

        function initClient() {
            window.client = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/drive.file',
                callback: (resp) => { tokenResponse = resp; uploadFile(); },
            });
        }

        function checkPass() {
            if(document.getElementById('passInput').value === ACCESS_PASS) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminTools').style.display = 'block';
            } else { alert("Incorrect Password"); }
        }

        let selectedFile = null;
        function handleFile(file) {
            selectedFile = file;
            document.getElementById('status').innerText = "Ready to upload: " + file.name;
            window.client.requestAccessToken();
        }

        async function uploadFile() {
            const name = document.getElementById('clientName').value;
            const dob = document.getElementById('clientDOB').value;
            if(!name || !dob) return alert("Please enter Name and DOB first!");

            document.getElementById('status').innerText = "Uploading... please wait.";
            
            const metadata = {
                name: `${name}_${dob}.stl`,
                mimeType: 'application/octet-stream'
            };

            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', selectedFile);

            try {
                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + tokenResponse.access_token },
                    body: form
                });
                const fileData = await response.json();
                
                // Set Permissions to Public
                await fetch(`https://www.googleapis.com/drive/v3/files/${fileData.id}/permissions`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + tokenResponse.access_token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role: 'reader', type: 'anyone' })
                });

                showLink(fileData.id, name, dob);
            } catch (err) {
                alert("Upload failed. Check console for details.");
                console.error(err);
            }
        }

        function showLink(id, name, dob) {
            const baseUrl = window.location.href.replace('operator.html', 'viewer.html');
            const finalUrl = `${baseUrl}?id=${id}&name=${encodeURIComponent(name)}&dob=${dob}`;
            document.getElementById('status').innerText = "✅ Upload Successful!";
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('shareLink').innerText = finalUrl;
            document.getElementById('shareLink').href = finalUrl;
        }

        function copyLink() {
            const link = document.getElementById('shareLink').innerText;
            navigator.clipboard.writeText(link);
            alert("Link copied!");
        }
    </script>
</body>
</html>
