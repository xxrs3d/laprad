<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D STL to HTML Generator</title>
    <style>
        /* Desain Background sesuai permintaan */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;  /* fallback for old browsers */
            background: -webkit-linear-gradient(to right, #e74c3c, #000000);  /* Chrome 10-25, Safari 5.1-6 */
            background: linear-gradient(to right, #e74c3c, #000000); /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
        }

        .container {
            background: rgba(25, 25, 25, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        h2 {
            color: #ffffff;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #cccccc;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input[type="text"]:focus, input[type="date"]:focus {
            outline: none;
            border-color: #e74c3c;
            box-shadow: 0 0 8px rgba(231, 76, 60, 0.4);
        }

        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 60px;
            border: 2px dashed #e74c3c;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(231, 76, 60, 0.05);
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 25px;
        }

        .file-upload-wrapper:hover {
            background: rgba(231, 76, 60, 0.15);
        }

        .file-upload-wrapper p {
            margin: 0;
            color: #e74c3c;
            font-weight: bold;
        }

        input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #c0392b;
        }

        #status {
            margin-top: 15px;
            text-align: center;
            color: #2ecc71;
            font-size: 14px;
            min-height: 20px;
        }

        #fileNameDisplay {
            color: #ffffff;
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>3D VIEWER GENERATOR</h2>
        
        <div class="input-group">
            <label>Nama Penerima / Pasien</label>
            <input type="text" id="pName" placeholder="Contoh: Budi Santoso" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Tanggal Lahir</label>
            <input type="date" id="pDob">
        </div>

        <label>Pilih File Model 3D (.STL)</label>
        <div class="file-upload-wrapper">
            <p id="fileLabel">Klik atau Drag File STL Kesini</p>
            <input type="file" id="stlInput" accept=".stl" onchange="updateFileName(this)">
        </div>
        <div id="fileNameDisplay"></div>

        <button onclick="generateOfflineFile()" id="generateBtn">Buat File Viewer</button>
        <div id="status"></div>
    </div>

    <script>
        // Update label saat file dipilih
        function updateFileName(input) {
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const fileLabel = document.getElementById('fileLabel');
            if (input.files.length > 0) {
                fileNameDisplay.innerText = "File terpilih: " + input.files[0].name;
                fileLabel.innerText = "File Siap!";
                fileLabel.style.color = "#2ecc71";
                input.parentElement.style.borderColor = "#2ecc71";
            }
        }

        function generateOfflineFile() {
            const name = document.getElementById('pName').value.trim();
            const dob = document.getElementById('pDob').value;
            const fileInput = document.getElementById('stlInput');
            const status = document.getElementById('status');
            const btn = document.getElementById('generateBtn');

            if (!name) return alert("Silakan isi Nama Penerima/Pasien!");
            if (!fileInput.files[0]) return alert("Silakan pilih file STL terlebih dahulu!");

            btn.innerText = "Memproses...";
            btn.style.background = "#555";
            btn.disabled = true;
            status.style.color = "#f39c12";
            status.innerText = "Membaca file 3D, mohon tunggu...";
            
            const file = fileInput.files[0];
            const reader = new FileReader();
            
            // Baca file sebagai ArrayBuffer agar aman untuk file binary (STL)
            reader.readAsArrayBuffer(file);
            
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                // Konversi ArrayBuffer ke Base64 dengan aman
                const base64Data = arrayBufferToBase64(arrayBuffer);
                
                status.innerText = "Membangun file viewer...";
                
                const htmlContent = createTemplate(name, dob, base64Data);
                
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                
                // Format nama file hasil download
                const safeName = name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                link.download = `3D_Viewer_${safeName}.html`;
                
                link.click();
                
                btn.innerText = "Buat File Viewer";
                btn.style.background = "#e74c3c";
                btn.disabled = false;
                status.style.color = "#2ecc71";
                status.innerText = "✅ Berhasil! File viewer telah didownload.";
            };
        }

        // Fungsi khusus untuk mengonversi STL binary besar ke Base64 tanpa crash
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            const len = bytes.byteLength;
            // Gunakan chunking untuk file besar agar memori browser tidak penuh
            for (let i = 0; i < len; i += 1024) {
                const chunk = bytes.subarray(i, i + 1024);
                binary += String.fromCharCode.apply(null, chunk);
            }
            return window.btoa(binary);
        }

        function createTemplate(name, dob, stlBase64) {
            const displayDob = dob ? dob : "Tidak disebutkan";
            const todayDate = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

            return `<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Viewer - ${name}</title>
    <style>
        body { margin: 0; background: #111; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #ui-panel { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: white; 
            background: rgba(20, 20, 20, 0.85); 
            padding: 20px; 
            border-radius: 12px; 
            pointer-events: none;
            border-left: 4px solid #e74c3c;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            min-width: 200px;
        }
        
        #ui-panel h3 { margin: 0 0 15px 0; color: #fff; font-size: 20px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .info-row { margin: 8px 0; font-size: 14px; color: #ccc; }
        .info-value { color: #fff; font-weight: bold; }
        
        #controls-help {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            pointer-events: none;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e74c3c;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="loading">Memuat Model 3D...</div>
    
    <div id="ui-panel">
        <h3>Data Rekam</h3>
        <div class="info-row">Nama: <span class="info-value">${name}</span></div>
        <div class="info-row">Tgl Lahir: <span class="info-value">${displayDob}</span></div>
        <div class="info-row" style="margin-top:15px; font-size: 11px; opacity: 0.6;">Dibuat pada: ${todayDate}</div>
    </div>

    <div id="controls-help">Klik Kiri: Putar | Scroll: Zoom | Klik Kanan: Geser</div>

    <!-- Import pustaka Three.js langsung dari CDN -->
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { STLLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/STLLoader.js';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';

        // Setup Scene dasar
        const scene = new THREE.Scene();
        // Beri sedikit warna gradasi gelap pada background 3D
        scene.background = new THREE.Color(0x1a1a1a);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Gerakan rotasi lebih mulus
        controls.dampingFactor = 0.05;

        // Pencahayaan
        scene.add(new THREE.AmbientLight(0x404040, 1.5)); // Cahaya dasar
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);
        
        const backLight = new THREE.DirectionalLight(0xffffff, 0.5);
        backLight.position.set(-10, -20, -10);
        scene.add(backLight);

        try {
            // Ubah Base64 kembali menjadi ArrayBuffer
            const stlBase64 = "${stlBase64}";
            const binaryString = window.atob(stlBase64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            // Parse file STL
            const loader = new STLLoader();
            const geometry = loader.parse(bytes.buffer);
            
            // Material model 3D (Warna silver metalik yang profesional)
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xcccccc, 
                metalness: 0.3,
                roughness: 0.4
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            
            // Posisi di tengah
            geometry.computeBoundingBox();
            const center = new THREE.Vector3();
            geometry.boundingBox.getCenter(center);
            mesh.position.sub(center);
            
            // Auto-scale model agar pas di layar
            const size = new THREE.Vector3();
            geometry.boundingBox.getSize(size);
            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.z = maxDim * 2;
            
            scene.add(mesh);
            document.getElementById('loading').style.display = 'none';

        } catch(e) {
            document.getElementById('loading').innerText = "Gagal memuat file 3D.";
            document.getElementById('loading').style.color = "red";
            console.error(e);
        }

        // Animasi Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Responsive jika layar diresize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    <\/script>
</body>
</html>`;
        }
    </script>
</body>
</html>
