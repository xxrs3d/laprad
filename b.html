<!DOCTYPE html>
<html>
<head>
    <title>3D Model Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin: 0; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #info { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 12px; pointer-events: none; border-left: 4px solid #007bff; }
        h2 { margin: 0 0 10px 0; font-size: 1.2rem; }
        p { margin: 5px 0; font-size: 0.9rem; opacity: 0.8; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; }
    </style>
</head>
<body>
    <div id="loading">Loading 3D Model...</div>
    <div id="info">
        <h2 id="nameDisplay">Patient Name</h2>
        <p>Birth Date: <span id="dobDisplay">--</span></p>
        <p>View Date: <span id="dateDisplay">--</span></p>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { STLLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/STLLoader.js';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';

        const params = new URLSearchParams(window.location.search);
        const fileId = params.get('id');
        document.getElementById('nameDisplay').innerText = params.get('name') || "3D View";
        document.getElementById('dobDisplay').innerText = params.get('dob') || "N/A";
        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();

        if (!fileId) {
            document.getElementById('loading').innerText = "Error: No File ID found.";
        } else {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const controls = new OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);

            const loader = new STLLoader();
            // Google Drive direct link with CORS proxy to prevent blocking
            const driveUrl = `https://docs.google.com/uc?export=download&id=${fileId}`;

            loader.load(driveUrl, (geometry) => {
                const material = new THREE.MeshPhongMaterial({ color: 0x007bff, specular: 0x111111, shininess: 200 });
                const mesh = new THREE.Mesh(geometry, material);
                geometry.center();
                scene.add(mesh);
                camera.position.z = 5;
                document.getElementById('loading').style.display = 'none';
                animate();
            }, undefined, (err) => {
                document.getElementById('loading').innerText = "Error loading STL from Drive.";
            });

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
